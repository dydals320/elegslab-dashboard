<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elegslab Data Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f1419;
            --bg-secondary: #1a1f2e;
            --bg-tertiary: #252d3d;
            --accent-primary: #00d4ff;
            --accent-secondary: #ff6b6b;
            --accent-tertiary: #51cf66;
            --text-primary: #e8eaed;
            --text-secondary: #a8abb5;
            --border-color: #3a4250;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-meta {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Filter Bar */
        .filter-bar {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select,
        .filter-group input {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .filter-group select:hover,
        .filter-group input:hover {
            border-color: var(--accent-primary);
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        /* KPI Cards */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.1);
        }

        .kpi-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .kpi-card:nth-child(1) .kpi-value {
            color: var(--accent-primary);
        }

        .kpi-card:nth-child(2) .kpi-value {
            color: var(--accent-tertiary);
        }

        .kpi-card:nth-child(3) .kpi-value {
            color: var(--accent-secondary);
        }

        .kpi-card:nth-child(4) .kpi-value {
            color: var(--accent-primary);
        }

        .kpi-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Charts Container */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .charts-row.full {
            grid-template-columns: 1fr;
        }

        .chart-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            position: relative;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--accent-primary);
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .charts-row.full .chart-wrapper {
            height: 350px;
        }

        /* Table Styles */
        .table-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
        }

        .table-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background-color: var(--bg-tertiary);
            position: sticky;
            top: 0;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--accent-primary);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s ease;
        }

        th:hover {
            background-color: rgba(0, 212, 255, 0.05);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        tr:hover {
            background-color: rgba(0, 212, 255, 0.03);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-촬영완료 {
            background-color: rgba(81, 207, 102, 0.2);
            color: var(--accent-tertiary);
        }

        .status-분석중 {
            background-color: rgba(0, 212, 255, 0.2);
            color: var(--accent-primary);
        }

        .status-분석완료 {
            background-color: rgba(81, 207, 102, 0.3);
            color: var(--accent-tertiary);
            font-weight: 700;
        }

        .status-재촬영필요 {
            background-color: rgba(255, 107, 107, 0.2);
            color: var(--accent-secondary);
        }

        .reshoot-flag {
            display: inline-block;
            width: 20px;
            height: 20px;
            background-color: var(--accent-secondary);
            border-radius: 3px;
            text-align: center;
            line-height: 20px;
            color: var(--bg-dark);
            font-weight: 700;
            font-size: 0.75rem;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .pagination button {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .pagination button:hover:not(:disabled) {
            background-color: var(--accent-primary);
            color: var(--bg-dark);
            border-color: var(--accent-primary);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background-color: var(--accent-primary);
            color: var(--bg-dark);
            border-color: var(--accent-primary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .charts-row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }

            .filter-bar {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .kpi-row {
                grid-template-columns: 1fr;
            }

            .filter-bar {
                grid-template-columns: 1fr;
            }

            .kpi-value {
                font-size: 2rem;
            }

            table {
                font-size: 0.8rem;
            }

            th, td {
                padding: 10px;
            }
        }

        /* Scroll bar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
            <div>
                <h1>elegslab Data Dashboard</h1>
                <div class="header-meta">업데이트: <span id="currentDate"></span> &nbsp;|&nbsp; <span id="dataSourceBadge" style="color:var(--text-secondary)">🔧 더미 데이터</span></div>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="refreshData()" style="background:var(--bg-tertiary); color:var(--text-primary); border:1px solid var(--border-color); padding:8px 16px; border-radius:6px; cursor:pointer; font-size:0.9rem;">🔄 새로고침</button>
                <button onclick="showSettingsPanel()" style="background:var(--accent-primary); color:#0f1419; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600; font-size:0.9rem;">⚙ Sheets 연결</button>
            </div>
        </div>

        <!-- Settings Overlay -->
        <div id="settingsOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
            <div style="background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px; padding:30px; max-width:520px; width:90%;">
                <h2 style="margin-bottom:20px; color:var(--accent-primary); font-size:1.3rem;">Google Sheets 연결 설정</h2>

                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; color:var(--text-secondary); font-size:0.85rem;">Spreadsheet ID</label>
                    <input id="sheetsId" type="text" placeholder="예: 1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" style="width:100%; padding:10px; background:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.9rem;">
                    <div style="margin-top:4px; color:var(--text-secondary); font-size:0.75rem;">URL에서 /d/ 뒤의 긴 문자열</div>
                </div>

                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; color:var(--text-secondary); font-size:0.85rem;">API Key</label>
                    <input id="sheetsApiKey" type="password" placeholder="Google Cloud Console에서 발급한 API Key" style="width:100%; padding:10px; background:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.9rem;">
                </div>

                <div style="margin-bottom:20px;">
                    <label style="display:block; margin-bottom:5px; color:var(--text-secondary); font-size:0.85rem;">시트 이름 (기본: Sheet1)</label>
                    <input id="sheetsName" type="text" value="Sheet1" style="width:100%; padding:10px; background:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:6px; color:var(--text-primary); font-size:0.9rem;">
                </div>

                <div id="connectionStatus" style="margin-bottom:15px; font-size:0.85rem; min-height:20px;"></div>

                <div style="display:flex; gap:10px; justify-content:flex-end;">
                    <button onclick="loadDummyData()" style="background:var(--bg-tertiary); color:var(--text-secondary); border:1px solid var(--border-color); padding:8px 16px; border-radius:6px; cursor:pointer; font-size:0.85rem;">더미 데이터로 전환</button>
                    <button onclick="hideSettingsPanel()" style="background:var(--bg-tertiary); color:var(--text-primary); border:1px solid var(--border-color); padding:8px 16px; border-radius:6px; cursor:pointer; font-size:0.85rem;">취소</button>
                    <button onclick="connectSheets()" style="background:var(--accent-primary); color:#0f1419; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600; font-size:0.85rem;">연결</button>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label for="mainCategoryFilter">대분류</label>
                <select id="mainCategoryFilter">
                    <option value="">전체</option>
                    <option value="거동">거동</option>
                    <option value="형광">형광</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="categoryFilter">소분류</label>
                <select id="categoryFilter">
                    <option value="">전체</option>
                    <option value="Thrashing">Thrashing</option>
                    <option value="Crawling on plate">Crawling on plate</option>
                    <option value="Crawling in microfluidics">Crawling in microfluidics</option>
                    <option value="거동 기타">거동 기타</option>
                    <option value="ROS">ROS</option>
                    <option value="muscle">muscle</option>
                    <option value="Neuron">Neuron</option>
                    <option value="형광 기타">형광 기타</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="researcherFilter">실험자</label>
                <select id="researcherFilter">
                    <option value="">전체</option>
                    <option value="김지훈">김지훈</option>
                    <option value="이서연">이서연</option>
                    <option value="박민수">박민수</option>
                    <option value="최유진">최유진</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="strainFilter">Strain</label>
                <select id="strainFilter">
                    <option value="">전체</option>
                    <option value="N2">N2</option>
                    <option value="daf-2">daf-2</option>
                    <option value="daf-16">daf-16</option>
                    <option value="eat-2">eat-2</option>
                    <option value="age-1">age-1</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="dateRangeFilter">기간</label>
                <select id="dateRangeFilter">
                    <option value="all">전체</option>
                    <option value="1week">최근 1주</option>
                    <option value="2weeks">최근 2주</option>
                    <option value="1month">최근 1개월</option>
                </select>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="kpi-row">
            <div class="kpi-card">
                <div class="kpi-label">전체 영상 수</div>
                <div class="kpi-value" id="totalVideos">0</div>
                <div class="kpi-meta">개</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">완료율</div>
                <div class="kpi-value" id="completionRate">0%</div>
                <div class="kpi-meta">분석완료 비율</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">총 저장 용량</div>
                <div class="kpi-value" id="totalStorage">0</div>
                <div class="kpi-meta">GB</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">금주 신규 건수</div>
                <div class="kpi-value" id="weeklyNew">0</div>
                <div class="kpi-meta">개</div>
            </div>
        </div>

        <!-- Charts Row 1 -->
        <div class="charts-row">
            <div class="chart-container">
                <div class="chart-title">카테고리별 진행률</div>
                <div class="chart-wrapper">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-title">저장 용량 분포</div>
                <div class="chart-wrapper">
                    <canvas id="storageChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Charts Row 2 -->
        <div class="charts-row full">
            <div class="chart-container">
                <div class="chart-title">일별 데이터 확보 추이</div>
                <div class="chart-wrapper">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Detail Table -->
        <div class="table-container">
            <div class="table-header">
                <div class="table-title">상세 데이터</div>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortTable('date')">날짜 ▼</th>
                            <th onclick="sortTable('researcher')">실험자 ▼</th>
                            <th onclick="sortTable('main_category')">대분류 ▼</th>
                            <th onclick="sortTable('category')">소분류 ▼</th>
                            <th onclick="sortTable('strain')">Strain ▼</th>
                            <th onclick="sortTable('condition')">조건 ▼</th>
                            <th onclick="sortTable('age')">Age ▼</th>
                            <th onclick="sortTable('file_count')">파일 수 ▼</th>
                            <th onclick="sortTable('size_gb')">용량 (GB) ▼</th>
                            <th onclick="sortTable('storage_location')">저장 위치 ▼</th>
                            <th onclick="sortTable('status')">상태 ▼</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        // Dummy Data Generation
        const researchers = ['김지훈', '이서연', '박민수', '최유진'];
        const categories = [
            { name: 'Thrashing', group: '거동' },
            { name: 'Crawling on plate', group: '거동' },
            { name: 'Crawling in microfluidics', group: '거동' },
            { name: '거동 기타', group: '거동' },
            { name: 'ROS', group: '형광' },
            { name: 'muscle', group: '형광' },
            { name: 'Neuron', group: '형광' },
            { name: '형광 기타', group: '형광' }
        ];
        const strains = ['N2', 'daf-2', 'daf-16', 'eat-2', 'age-1'];
        const conditions = ['control', 'drug_A', 'drug_B', 'heat_stress', 'oxidative_stress'];
        const statuses = ['촬영완료', '분석중', '분석완료', '재촬영필요'];
        const storageLocations = ['//NAS-A/data', '//NAS-B/backup', 'D:/experiments', 'Google Drive', '외장 HDD-1'];
        const ages = ['L1', 'L2', 'L3', 'L4', ...Array.from({length: 20}, (_, i) => `Day${i + 1}`)];

        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        const rowsPerPage = 15;
        let sortConfig = { key: 'date', direction: 'desc' };

        // Chart objects
        let progressChart = null;
        let storageChart = null;
        let trendChart = null;

        function generateDummyData() {
            const startDate = new Date('2026-02-01');
            const endDate = new Date('2026-03-25');

            for (let i = 0; i < 95; i++) {
                const randomDate = new Date(startDate.getTime() + Math.random() * (endDate.getTime() - startDate.getTime()));
                const category = categories[Math.floor(Math.random() * categories.length)];

                allData.push({
                    id: i + 1,
                    date: randomDate.toISOString().split('T')[0],
                    researcher: researchers[Math.floor(Math.random() * researchers.length)],
                    category: category.name,
                    main_category: category.group,
                    strain: strains[Math.floor(Math.random() * strains.length)],
                    condition: conditions[Math.floor(Math.random() * conditions.length)],
                    age: ages[Math.floor(Math.random() * ages.length)],
                    file_count: Math.floor(Math.random() * 30) + 5,
                    size_gb: (Math.random() * 50 + 5).toFixed(2),
                    storage_location: storageLocations[Math.floor(Math.random() * storageLocations.length)],
                    status: statuses[Math.floor(Math.random() * statuses.length)],
                    reshoot_flag: Math.random() > 0.85
                });
            }

            allData.sort((a, b) => new Date(b.date) - new Date(a.date));
            filteredData = [...allData];
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');
        }

        function applyFilters() {
            const mainCategory = document.getElementById('mainCategoryFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const researcher = document.getElementById('researcherFilter').value;
            const strain = document.getElementById('strainFilter').value;
            const dateRange = document.getElementById('dateRangeFilter').value;

            const today = new Date();
            let startDate = new Date('2020-01-01');

            if (dateRange === '1week') {
                startDate = new Date(today);
                startDate.setDate(today.getDate() - 7);
            } else if (dateRange === '2weeks') {
                startDate = new Date(today);
                startDate.setDate(today.getDate() - 14);
            } else if (dateRange === '1month') {
                startDate = new Date(today);
                startDate.setMonth(today.getMonth() - 1);
            }

            filteredData = allData.filter(item => {
                const itemDate = new Date(item.date);
                return (!mainCategory || item.main_category === mainCategory) &&
                       (!category || item.category === category) &&
                       (!researcher || item.researcher === researcher) &&
                       (!strain || item.strain === strain) &&
                       (itemDate >= startDate && itemDate <= today);
            });

            currentPage = 1;
            updateDisplay();
        }

        function updateDisplay() {
            updateKPIs();
            updateCharts();
            updateTable();
        }

        function updateKPIs() {
            const totalVideos = filteredData.reduce((sum, item) => sum + item.file_count, 0);
            const completedCount = filteredData.filter(item => item.status === '분석완료').length;
            const completionRate = filteredData.length > 0 ? Math.round((completedCount / filteredData.length) * 100) : 0;
            const totalStorage = filteredData.reduce((sum, item) => sum + parseFloat(item.size_gb), 0).toFixed(1);

            const today = new Date();
            const weekAgo = new Date(today);
            weekAgo.setDate(today.getDate() - 7);
            const weeklyNew = filteredData.filter(item => {
                const itemDate = new Date(item.date);
                return itemDate >= weekAgo && itemDate <= today;
            }).length;

            document.getElementById('totalVideos').textContent = totalVideos;
            document.getElementById('completionRate').textContent = completionRate + '%';
            document.getElementById('totalStorage').textContent = totalStorage;
            document.getElementById('weeklyNew').textContent = weeklyNew;
        }

        function updateCharts() {
            updateProgressChart();
            updateStorageChart();
            updateTrendChart();
        }

        function updateProgressChart() {
            const categoryProgress = {};
            categories.forEach(cat => {
                categoryProgress[cat.name] = { '촬영완료': 0, '분석중': 0, '분석완료': 0, '재촬영필요': 0 };
            });

            filteredData.forEach(item => {
                if (categoryProgress[item.category]) {
                    categoryProgress[item.category][item.status]++;
                }
            });

            const labels = Object.keys(categoryProgress);
            const datasets = [
                {
                    label: '촬영완료',
                    data: labels.map(cat => categoryProgress[cat]['촬영완료']),
                    backgroundColor: 'rgba(81, 207, 102, 0.8)'
                },
                {
                    label: '분석중',
                    data: labels.map(cat => categoryProgress[cat]['분석중']),
                    backgroundColor: 'rgba(0, 212, 255, 0.8)'
                },
                {
                    label: '분석완료',
                    data: labels.map(cat => categoryProgress[cat]['분석완료']),
                    backgroundColor: 'rgba(81, 207, 102, 1)'
                },
                {
                    label: '재촬영필요',
                    data: labels.map(cat => categoryProgress[cat]['재촬영필요']),
                    backgroundColor: 'rgba(255, 107, 107, 0.8)'
                }
            ];

            const ctx = document.getElementById('progressChart').getContext('2d');
            if (progressChart) progressChart.destroy();
            progressChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#e8eaed', font: { size: 11 } },
                            position: 'bottom'
                        }
                    },
                    scales: {
                        x: {
                            stacked: true,
                            ticks: { color: '#a8abb5' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            stacked: true,
                            ticks: { color: '#a8abb5' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function updateStorageChart() {
            const categoryStorage = {};
            categories.forEach(cat => {
                categoryStorage[cat.name] = 0;
            });

            filteredData.forEach(item => {
                if (categoryStorage[item.category] !== undefined) {
                    categoryStorage[item.category] += parseFloat(item.size_gb);
                }
            });

            const labels = Object.keys(categoryStorage).filter(cat => categoryStorage[cat] > 0);
            const data = labels.map(cat => parseFloat(categoryStorage[cat]).toFixed(1));
            const colors = ['#00d4ff', '#ff6b6b', '#51cf66', '#ffd43b', '#b197fc', '#ff8c42', '#69db7c', '#748ffc'];

            const ctx = document.getElementById('storageChart').getContext('2d');
            if (storageChart) storageChart.destroy();
            storageChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: colors.slice(0, labels.length),
                        borderColor: '#1a1f2e',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#e8eaed', font: { size: 11 }, padding: 15 },
                            position: 'right'
                        }
                    }
                }
            });
        }

        function updateTrendChart() {
            const dailyData = {};
            filteredData.forEach(item => {
                if (!dailyData[item.date]) {
                    dailyData[item.date] = { '거동': 0, '형광': 0 };
                }
                dailyData[item.date][item.main_category]++;
            });

            const dates = Object.keys(dailyData).sort();
            const behaviorData = dates.map(date => dailyData[date]['거동']);
            const fluorenceData = dates.map(date => dailyData[date]['형광']);

            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.map(d => d.substring(5)),
                    datasets: [
                        {
                            label: '거동',
                            data: behaviorData,
                            borderColor: '#00d4ff',
                            backgroundColor: 'rgba(0, 212, 255, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3,
                            pointBackgroundColor: '#00d4ff'
                        },
                        {
                            label: '형광',
                            data: fluorenceData,
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255, 107, 107, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3,
                            pointBackgroundColor: '#ff6b6b'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            labels: { color: '#e8eaed', font: { size: 12 } },
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#a8abb5' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        x: {
                            ticks: { color: '#a8abb5' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });
        }

        function sortTable(key) {
            if (sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'asc';
            }

            filteredData.sort((a, b) => {
                let aVal = a[key];
                let bVal = b[key];

                if (key === 'file_count' || key === 'size_gb') {
                    aVal = parseFloat(aVal);
                    bVal = parseFloat(bVal);
                } else if (key === 'date') {
                    aVal = new Date(aVal);
                    bVal = new Date(bVal);
                }

                if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            currentPage = 1;
            updateTable();
        }

        function updateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filteredData.slice(start, end);

            pageData.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${formatDate(item.date)}</td>
                    <td>${item.researcher}</td>
                    <td>${item.main_category}</td>
                    <td>${item.category}</td>
                    <td>${item.strain}</td>
                    <td>${item.condition}</td>
                    <td>${item.age || '-'}</td>
                    <td>${item.file_count}</td>
                    <td>${item.size_gb}</td>
                    <td>${item.storage_location || '-'}</td>
                    <td>
                        <span class="status-badge status-${item.status}">${item.status}</span>
                        ${item.reshoot_flag ? '<span class="reshoot-flag">!</span>' : ''}
                    </td>
                `;
                tbody.appendChild(row);
            });

            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.className = i === currentPage ? 'active' : '';
                button.onclick = () => {
                    currentPage = i;
                    updateTable();
                };
                paginationDiv.appendChild(button);
            }
        }

        // Update subcategory dropdown based on main category selection
        function updateSubcategoryOptions() {
            const mainCategory = document.getElementById('mainCategoryFilter').value;
            const categoryFilter = document.getElementById('categoryFilter');
            const currentValue = categoryFilter.value;

            categoryFilter.innerHTML = '<option value="">전체</option>';

            const filtered = mainCategory
                ? categories.filter(c => c.group === mainCategory)
                : categories;

            filtered.forEach(c => {
                const option = document.createElement('option');
                option.value = c.name;
                option.textContent = c.name;
                categoryFilter.appendChild(option);
            });

            // Restore selection if still valid, otherwise reset
            const stillValid = filtered.some(c => c.name === currentValue);
            categoryFilter.value = stillValid ? currentValue : '';
        }

        // Event Listeners
        document.getElementById('mainCategoryFilter').addEventListener('change', () => {
            updateSubcategoryOptions();
            applyFilters();
        });
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('researcherFilter').addEventListener('change', applyFilters);
        document.getElementById('strainFilter').addEventListener('change', applyFilters);
        document.getElementById('dateRangeFilter').addEventListener('change', applyFilters);

        // ====== Google Sheets API Integration ======
        const SHEETS_CONFIG_KEY = 'elegslab_sheets_config';

        function getSheetsConfig() {
            try {
                const raw = sessionStorage.getItem(SHEETS_CONFIG_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch { return null; }
        }
        function saveSheetsConfig(config) {
            sessionStorage.setItem(SHEETS_CONFIG_KEY, JSON.stringify(config));
        }

        async function fetchFromGoogleSheets(spreadsheetId, apiKey, sheetName = 'Sheet1') {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Sheets API 오류: ${res.status} ${res.statusText}`);
            const json = await res.json();
            return json.values || [];
        }

        function parseSheetsData(rows) {
            if (rows.length < 2) return [];
            const headers = rows[0].map(h => h.trim().toLowerCase());

            // Column mapping (유연하게 매칭)
            const colMap = {};
            const mapping = {
                'date': ['date', '날짜', 'date'],
                'researcher': ['researcher', '실험자', '연구자'],
                'main_category': ['main_category', '대분류', 'group'],
                'category': ['category', '소분류', 'subcategory', 'type'],
                'strain': ['strain', '균주'],
                'condition': ['condition', '조건'],
                'age': ['age', '나이', 'worm age'],
                'file_count': ['file_count', '파일수', '파일 수', 'files'],
                'size_gb': ['size_gb', '용량', '용량(gb)', 'size', 'gb'],
                'status': ['status', '상태'],
                'storage_location': ['storage_location', '저장위치', '저장 위치', 'location', 'path'],
            };

            for (const [key, aliases] of Object.entries(mapping)) {
                const idx = headers.findIndex(h => aliases.some(a => h.includes(a)));
                if (idx >= 0) colMap[key] = idx;
            }

            const data = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;

                // Skip Korean reference header row (row 2)
                const dateVal = (row[colMap.date] || '').trim();
                if (!dateVal || dateVal === '날짜') continue;

                // Handle date: could be YYYY-MM-DD string or Google Sheets serial number
                let parsedDate = dateVal;
                if (/^\d{5}$/.test(dateVal)) {
                    // Google Sheets serial number → date
                    const d = new Date((parseInt(dateVal) - 25569) * 86400000);
                    parsedDate = d.toISOString().split('T')[0];
                } else if (/^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}$/.test(dateVal)) {
                    parsedDate = dateVal.replace(/\//g, '-');
                }

                const cat = (row[colMap.category] || '').trim();
                const mainCat = (row[colMap.main_category] || '').trim() ||
                    (categories.find(c => c.name === cat)?.group || '');

                data.push({
                    id: i,
                    date: parsedDate,
                    researcher: (row[colMap.researcher] || '').trim(),
                    category: cat,
                    main_category: mainCat,
                    strain: (row[colMap.strain] || '').trim(),
                    condition: (row[colMap.condition] || '').trim(),
                    age: (row[colMap.age] || '').trim(),
                    file_count: parseInt(row[colMap.file_count] || '0') || 0,
                    size_gb: parseFloat(row[colMap.size_gb] || '0') || 0,
                    storage_location: (row[colMap.storage_location] || '').trim(),
                    status: (row[colMap.status] || '').trim(),
                    reshoot_flag: (row[colMap.status] || '').includes('재촬영')
                });
            }
            return data;
        }

        // Dynamic filter options from real data
        function updateFilterOptions() {
            const researcherSet = new Set(allData.map(d => d.researcher).filter(Boolean));
            const strainSet = new Set(allData.map(d => d.strain).filter(Boolean));

            const researcherFilter = document.getElementById('researcherFilter');
            const strainFilter = document.getElementById('strainFilter');

            const currentResearcher = researcherFilter.value;
            const currentStrain = strainFilter.value;

            researcherFilter.innerHTML = '<option value="">전체</option>';
            [...researcherSet].sort().forEach(r => {
                const opt = document.createElement('option');
                opt.value = r; opt.textContent = r;
                researcherFilter.appendChild(opt);
            });

            strainFilter.innerHTML = '<option value="">전체</option>';
            [...strainSet].sort().forEach(s => {
                const opt = document.createElement('option');
                opt.value = s; opt.textContent = s;
                strainFilter.appendChild(opt);
            });

            researcherFilter.value = researcherSet.has(currentResearcher) ? currentResearcher : '';
            strainFilter.value = strainSet.has(currentStrain) ? currentStrain : '';
        }

        // Settings panel logic
        function showSettingsPanel() {
            document.getElementById('settingsOverlay').style.display = 'flex';
            const config = getSheetsConfig();
            if (config) {
                document.getElementById('sheetsId').value = config.spreadsheetId || '';
                document.getElementById('sheetsApiKey').value = config.apiKey || '';
                document.getElementById('sheetsName').value = config.sheetName || 'Sheet1';
            }
        }
        function hideSettingsPanel() {
            document.getElementById('settingsOverlay').style.display = 'none';
        }

        async function connectSheets() {
            const spreadsheetId = document.getElementById('sheetsId').value.trim();
            const apiKey = document.getElementById('sheetsApiKey').value.trim();
            const sheetName = document.getElementById('sheetsName').value.trim() || 'Sheet1';
            const statusEl = document.getElementById('connectionStatus');

            if (!spreadsheetId || !apiKey) {
                statusEl.textContent = '⚠ Spreadsheet ID와 API Key를 모두 입력하세요';
                statusEl.style.color = 'var(--accent-secondary)';
                return;
            }

            statusEl.textContent = '⏳ 연결 중...';
            statusEl.style.color = 'var(--text-secondary)';

            try {
                const rows = await fetchFromGoogleSheets(spreadsheetId, apiKey, sheetName);
                const parsed = parseSheetsData(rows);

                if (parsed.length === 0) {
                    statusEl.textContent = '⚠ 데이터를 찾을 수 없습니다. 시트 구조를 확인하세요';
                    statusEl.style.color = 'var(--accent-secondary)';
                    return;
                }

                allData = parsed;
                allData.sort((a, b) => new Date(b.date) - new Date(a.date));
                filteredData = [...allData];

                saveSheetsConfig({ spreadsheetId, apiKey, sheetName });
                updateFilterOptions();
                updateDisplay();

                statusEl.textContent = `✅ 연결 성공! ${parsed.length}건 로드됨`;
                statusEl.style.color = 'var(--accent-tertiary)';
                document.getElementById('dataSourceBadge').textContent = '📊 Google Sheets 연동';
                document.getElementById('dataSourceBadge').style.color = 'var(--accent-tertiary)';

                setTimeout(hideSettingsPanel, 1200);
            } catch (err) {
                statusEl.textContent = `❌ 오류: ${err.message}`;
                statusEl.style.color = 'var(--accent-secondary)';
            }
        }

        function loadDummyData() {
            allData = [];
            generateDummyData();
            filteredData = [...allData];
            updateFilterOptions();
            updateDisplay();
            document.getElementById('dataSourceBadge').textContent = '🔧 더미 데이터';
            document.getElementById('dataSourceBadge').style.color = 'var(--text-secondary)';
            hideSettingsPanel();
        }

        async function refreshData() {
            const config = getSheetsConfig();
            if (config) {
                try {
                    const rows = await fetchFromGoogleSheets(config.spreadsheetId, config.apiKey, config.sheetName);
                    const parsed = parseSheetsData(rows);
                    if (parsed.length > 0) {
                        allData = parsed;
                        allData.sort((a, b) => new Date(b.date) - new Date(a.date));
                        filteredData = [...allData];
                        updateFilterOptions();
                        updateDisplay();
                    }
                } catch (err) {
                    console.error('Refresh failed:', err);
                }
            }
        }

        // Initialize
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('ko-KR', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        // Try loading from saved config, fallback to dummy
        (async function init() {
            const config = getSheetsConfig();
            if (config) {
                try {
                    const rows = await fetchFromGoogleSheets(config.spreadsheetId, config.apiKey, config.sheetName);
                    const parsed = parseSheetsData(rows);
                    if (parsed.length > 0) {
                        allData = parsed;
                        allData.sort((a, b) => new Date(b.date) - new Date(a.date));
                        filteredData = [...allData];
                        updateFilterOptions();
                        updateDisplay();
                        document.getElementById('dataSourceBadge').textContent = '📊 Google Sheets 연동';
                        document.getElementById('dataSourceBadge').style.color = 'var(--accent-tertiary)';
                        return;
                    }
                } catch (err) {
                    console.warn('Sheets 연결 실패, 더미 데이터로 전환:', err);
                }
            }
            generateDummyData();
            updateDisplay();
        })();
    </script>
